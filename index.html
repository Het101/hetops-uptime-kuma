<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <link rel="icon" type="image/svg+xml" href="/icon.svg" />
        <link rel="manifest" href="/manifest.json" />
        <meta name="theme-color" id="theme-color" content="" />
        <meta name="description" content="HetOps Status — Self-hosted reliability monitoring by HetOps.dev" />
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Fira+Code:wght@400;500&display=swap");
        </style>
        <title>HetOps Status</title>
        <style>
            .noscript-message {
                font-size: 20px;
                text-align: center;
                padding: 10px;
                max-width: 500px;
                margin: 0 auto;
            }
        </style>
    </head>
    <body>
        <!-- DYNAMIC BACKGROUND WITH PARTICLES (HetOps Theme) -->
        <div
            style="
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: -1;
                overflow: hidden;
                pointer-events: none;
            "
        >
            <div
                style="
                    position: absolute;
                    top: -10%;
                    right: -10%;
                    width: 600px;
                    height: 600px;
                    background: rgba(16, 185, 129, 0.05);
                    filter: blur(120px);
                    border-radius: 50%;
                "
            ></div>
            <div
                style="
                    position: absolute;
                    bottom: -10%;
                    left: -10%;
                    width: 600px;
                    height: 600px;
                    background: rgba(37, 99, 235, 0.05);
                    filter: blur(120px);
                    border-radius: 50%;
                "
            ></div>
            <div id="particles-container"></div>
        </div>

        <noscript>
            <div class="noscript-message">
                Sorry, you don't seem to have JavaScript enabled or your browser doesn't support it.
                <br />
                This website requires JavaScript to function. Please enable JavaScript in your browser settings to
                continue.
            </div>
        </noscript>
        <div id="app"></div>
        <script>
            function createParticles() {
                const container = document.getElementById('particles-container');
                if (!container) return;
                for (let i = 0; i < 20; i++) {
                    const particle = document.createElement('div');
                    particle.style.position = 'absolute';
                    particle.style.width = '4px';
                    particle.style.height = '4px';
                    particle.style.background = 'rgba(0, 255, 65, 0.3)';
                    particle.style.borderRadius = '50%';
                    particle.style.left = Math.random() * 100 + '%';
                    
                    // Generate floating animation dynamically
                    const duration = (15 + Math.random() * 10);
                    const delay = Math.random() * 20;
                    
                    particle.animate([
                        { transform: 'translateY(0) translateX(0)', opacity: 0 },
                        { opacity: 1, offset: 0.1 },
                        { opacity: 1, offset: 0.9 },
                        { transform: 'translateY(-100vh) translateX(100px)', opacity: 0 }
                    ], {
                        duration: duration * 1000,
                        delay: delay * 1000,
                        iterations: Infinity
                    });
                    
                    container.appendChild(particle);
                }
            }
            // Run when DOM is ready
            document.addEventListener("DOMContentLoaded", createParticles);
        </script>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
